trigger:
- master

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: Docker@2
      displayName: Build API image
      inputs:
        command: build
        Dockerfile: '$(Build.SourcesDirectory)/Application/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        repository: 'health-monitoring-api'
        tags: |
          $(tag)

    - task: CopyFiles@2
      displayName: Copy Kubernetes manifests
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/Application'
        Contents: |
          *.yaml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/k8s'

    - task: PublishBuildArtifacts@1
      displayName: Publish drop artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: Deploy
    pool:
      vmImage: ubuntu-latest

    steps:
    - download: current
      artifact: drop

    - script: |
        pwd
        find . -name "application.yaml"
      displayName: Find yaml

    - task: Kubernetes@1
      displayName: Apply Kubernetes manifests
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'AzureStudentConnection'
        azureResourceGroup: 'rg-aks-cluster'
        kubernetesCluster: 'aks-cluster'
        namespace: 'default'
        command: 'apply'
        useConfigurationFile: true
        configuration: '$(Pipeline.Workspace)/drop/k8s/application.yaml'