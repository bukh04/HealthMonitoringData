# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- master

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build API image
      inputs:
        command: build
        Dockerfile: '$(Build.SourcesDirectory)/Application/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        repository: 'health-monitoring-api'
        tags: |
          $(tag)
    - task: CopyFiles@2
      displayName: Copy Kubernetes manifests
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/Application'
        Contents: |
          *.yaml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/k8s'

    - task: PublishBuildArtifacts@1
      displayName: Publish drop artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'
